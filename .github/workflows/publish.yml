name: Publish to NuGet

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal

      - name: Extract version from tag
        id: version
        run: |
          RAW="${GITHUB_REF_NAME#v}"
          # Validate that the extracted string is a valid SemVer version
          if [[ "$RAW" =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "VERSION=$RAW" >> $GITHUB_OUTPUT
          else
            # Fallback for manual/branch runs: use a dev pre-release version
            SHORT_SHA=$(git rev-parse --short HEAD)
            echo "VERSION=0.0.0-${GITHUB_REF_NAME}.${SHORT_SHA}" >> $GITHUB_OUTPUT
          fi

      - name: Pack
        run: dotnet pack src/Touchstone.Parser/Touchstone.Parser.csproj --configuration Release --no-build -o ./nupkg /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Publish to NuGet.org
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.TOUCHSTONE_PARSER }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Publish to GitHub Packages
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.GITHUB_TOKEN }} --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json --skip-duplicate
